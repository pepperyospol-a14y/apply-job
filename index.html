<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYR Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #main-page img {
            width: 100%;
            max-width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .btn-apply {
            background: #00bfff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-apply:hover { transform: scale(1.1); background: #0099cc; }
        
        #form-page { display: none; text-align: left; }
        
        .form-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #f1c40f;
        }
        label { color: #f1c40f; display: block; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
        .btn-submit {
            background: #f1c40f;
            color: black;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #d4ac0d; }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <div id="main-page" class="animate__animated animate__zoomIn">
        <img src="135_20260402003057 (1).webp" alt="HYR Logo" class="animate__animated animate__pulse animate__infinite">
        <h2 style="color:#f1c40f">HAT YAI RAILWAYS</h2>
        <p class="animate__animated animate__fadeInUp delay-1">ยินดีต้อนรับสู่ระบบรับสมัครพนักงาน</p>
        <button class="btn-apply animate__animated animate__fadeInUp delay-2" onclick="showForm()">สมัครงาน</button>
    </div>

    <div id="form-page">
        <h2 style="text-align:center; color:#f1c40f" class="animate__animated animate__fadeInDown">แบบฟอร์มสมัครงาน</h2>
        <form id="applicationForm">
            <div class="form-card animate__animated animate__fadeInLeft delay-1">
                <label>👤 ชื่อ-นามสกุล</label>
                <input type="text" id="name" required placeholder="กรอกชื่อของคุณ">
            </div>
            <div class="form-card animate__animated animate__fadeInLeft delay-2">
                <label>🎮 ชื่อดิสคอร์ด</label>
                <input type="text" id="discord" required placeholder="Name#0000">
            </div>
            <div class="form-card animate__animated animate__fadeInLeft delay-3">
                <label>🚉 ตำแหน่งที่สมัคร</label>
                <select id="position" required>
                    <option value="">-- เลือกตำแหน่ง --</option>
                    <option>พนักงานขับรถไฟ</option>
                    <option>นายสถานี</option>
                    <option>พนักงานขายตั๋ว</option>
                    <option>พนักงานคุมประแจ</option>
                    <option>พนักงานไม้กั้น</option>
                    <option>พนักงานรักษารถ</option>
                    <option>พนักงานห้ามล้อ</option>
                </select>
            </div>
            <div class="form-card animate__animated animate__fadeInUp delay-1">
                <label>📝 เหตุผลที่อยากสมัคร (2-3 บรรทัด)</label>
                <textarea id="reason" rows="3" required></textarea>
            </div>
            <div class="form-card animate__animated animate__fadeInUp delay-2">
                <label>⚠️ สัญญาว่าจะไม่ทำเสื่อมเสียใช่หรือไม่?</label>
                <select id="promise" required>
                    <option value="">-- โปรดยืนยัน --</option>
                    <option>ใช่ ข้าพเจ้าสัญญา</option>
                    <option>ไม่</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit animate__animated animate__bounceIn delay-3">ส่งใบสมัคร</button>
        </form>
    </div>
</div>

<script>
    function showForm() {
        const mainPage = document.getElementById('main-page');
        const formPage = document.getElementById('form-page');
        mainPage.classList.add('animate__fadeOutLeft');
        setTimeout(() => {
            mainPage.style.display = 'none';
            formPage.style.display = 'block';
        }, 500);
    }

    document.getElementById('applicationForm').onsubmit = function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "กำลังส่ง...";
        submitBtn.disabled = true;

        // *** ใส่ Webhook URL ของคุณที่นี่ ***
        const webhookURL = "https://discord.com/api/webhooks/1496815302204326002/CMBIspZ753p4e6oSlXautHlSCSOMHCqIgPGe1A1shb2qBQT5oVOjo4SzEh55hCUIdgPK"; 

        const data = {
            username: "HYR Recruitment Bot",
            embeds: [{
                title: "📢 มีใบสมัครใหม่เข้าสถานี!",
                color: 15844367,
                fields: [
                    { name: "👤 ชื่อ-นามสกุล", value: document.getElementById('name').value, inline: true },
                    { name: "🎮 ดิสคอร์ด", value: document.getElementById('discord').value, inline: true },
                    { name: "🚉 ตำแหน่ง", value: document.getElementById('position').value, inline: false },
                    { name: "📝 เหตุผล", value: document.getElementById('reason').value },
                    { name: "⚠️ คำสัญญา", value: document.getElementById('promise').value }
                ],
                footer: { text: "HAT YAI RAILWAYS System" }
            }]
        };

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('ส่งใบสมัครสำเร็จ! ทีมงานจะติดต่อกลับไป');
            location.reload();
        })
        .catch(() => {
            alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
            submitBtn.innerText = "ส่งใบสมัคร";
            submitBtn.disabled = false;
        });
    };
</script>

</body>
</html>
