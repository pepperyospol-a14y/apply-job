<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYR Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        #main-page img {
            width: 100%;
            max-width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .btn-apply {
            background: #00bfff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }
        #form-page { display: none; text-align: left; }
        .form-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #f1c40f;
        }
        label { color: #f1c40f; display: block; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
        .btn-submit {
            background: #f1c40f;
            color: black;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="main-page">
        <img src="hyr-logo.png" alt="HYR Logo">
        <h2 style="color:#f1c40f">HAT YAI RAILWAYS</h2>
        <p>ยินดีต้อนรับสู่ระบบรับสมัครพนักงาน</p>
        <button class="btn-apply" onclick="showForm()">คลิกเพื่อเริ่มสมัคร</button>
    </div>

    <div id="form-page">
        <h2 style="text-align:center; color:#f1c40f">แบบฟอร์มสมัครงาน</h2>
        <form id="applicationForm">
            <div class="form-card"><label>👤 ชื่อ-นามสกุล</label><input type="text" required></div>
            <div class="form-card"><label>🎮 ชื่อดิสคอร์ด</label><input type="text" required></div>
            <div class="form-card">
                <label>🚉 ตำแหน่งที่สมัคร</label>
                <select required>
                    <option value="">-- เลือกตำแหน่ง --</option>
                    <option>พนักงานขับรถไฟ</option>
                    <option>นายสถานี</option>
                    <option>พนักงานขายตั๋ว</option>
                    <option>พนักงานคุมประแจ</option>
                    <option>พนักงานไม้กั้น</option>
                    <option>พนักงานรักษารถ</option>
                    <option>พนักงานห้ามล้อ</option>
                </select>
            </div>
            <div class="form-card"><label>📝 เหตุผลที่อยากสมัคร (2-3 บรรทัด)</label><textarea rows="3" required></textarea></div>
            <div class="form-card">
                <label>⚠️ หลังจากที่สมัครไปแล้ว จะไม่เรื้อนแมพ / ทำให้คุณเต้ขายขี้หน้า / อับอาย ใช่หรือไม่</label>
                <select required>
                    <option value="">-- โปรดยืนยัน --</option>
                    <option>ใช่ ข้าพเจ้าสัญญา</option>
                    <option>ไม่ ข้าพเจ้าไม่สน</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">ส่งใบสมัคร</button>
        </form>
    </div>
</div>
<script>
    function showForm() {
        document.getElementById('main-page').style.display = 'none';
        document.getElementById('form-page').style.display = 'block';
    }
    document.getElementById('applicationForm').onsubmit = function(e) {
        e.preventDefault();
        alert('ส่งใบสมัครสำเร็จ!');
    };
</script>
</body>
</html>
