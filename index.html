<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYR Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #f1c40f;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        .logo-img {
            width: 100%;
            max-width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .btn-apply {
            background: linear-gradient(45deg, #00bfff, #0077ff);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-apply:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
        }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <div class="animate__animated animate__zoomIn">
        <img src="hyr-logo.png" alt="HYR Logo" class="logo-img animate__animated animate__pulse animate__infinite">
        
        <h2 style="color:#f1c40f">HAT YAI RAILWAYS</h2>
        <p>เปิดรับสมัครพนักงานใหม่</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSe_m_TOD_IrnqxMx4Fj2dryrDLgCU8tF-u10WNsw8-8n5M73A/viewform?usp=header" target="_blank" class="btn-apply">
            เริ่มการสมัครงาน
        </a>

        <p style="font-size: 0.8rem; margin-top: 25px; color: #888;">
            * ข้อมูลของคุณจะได้รับการคุ้มครองโดยระบบ Google Security
        </p>
    </div>
</div>

</body>
</html>
