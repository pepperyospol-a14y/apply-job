<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสมัครพนักงาน - Yellow Edition (HYR)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-yellow: #f1c40f;
            --dark-yellow: #f39c12;
            --bg-dark: #1a1a1a;
            --main-blue: #00bfff; /* เพิ่มสีฟ้าจากโลโก้เล็กน้อย */
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--main-yellow);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        /* หัวข้อ */
        h2 { color: var(--main-yellow); text-transform: uppercase; letter-spacing: 2px; }

        /* การปรับแต่งหน้าแรก */
        #main-page img {
            width: 80%; /* ลดขนาดโลโก้ลงเล็กน้อยเพื่อให้ดูสมดุล */
            max-width: 300px; /* กำหนดขนาดสูงสุด */
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .btn-apply {
            background: linear-gradient(45deg, var(--main-blue), #1e90ff); /* เปลี่ยนเป็นสีฟ้าตามโลโก้ HYR */
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 191, 255, 0.4);
        }

        .btn-apply:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 191, 255, 0.6); }

        /* สไตล์ฟอร์มแบบ Card ตามรูปที่ส่งมา */
        #form-page { display: none; text-align: left; }

        .form-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid var(--main-yellow);
            transition: 0.3s;
        }

        .form-card:hover { background: rgba(255, 255, 255, 0.15); }

        label { display: block; font-weight: 400; margin-bottom: 10px; color: var(--main-yellow); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-family: 'Kanit';
        }

        input:focus, select:focus { border-color: var(--main-yellow); outline: none; }

        .btn-submit {
            background: var(--main-blue); /* เปลี่ยนปุ่มส่งเป็นสีฟ้า */
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        option { background: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <img src="hyr-logo.png" alt="โลโก้ HAT YAI RAILWAYS (HYR)">
        <h2>ระบบรับสมัครพนักงาน</h2>
        <p style="color: #ccc;">ยินดีต้อนรับสู่ครอบครัว HAT YAI RAILWAYS</p>
        <p style="color: #ccc;">กรุณากดปุ่มด้านล่างเพื่อเริ่มกรอกข้อมูลสมัครงาน</p>
        <br>
        <button class="btn-apply" onclick="showForm()">สมัครงาน</button>
    </div>

    <div id="form-page">
        <h2 style="text-align: center;">แบบฟอร์มสมัครงาน</h2>
        <form id="applicationForm">
            
            <div class="form-card">
                <label>👤 ชื่อ - นามสกุล</label>
                <input type="text" placeholder="ระบุชื่อจริง-นามสกุล" required>
            </div>

            <div class="form-card">
                <label>🎮 ชื่อดิสคอร์ด</label>
                <input type="text" placeholder="เช่น Name#1234" required>
            </div>

            <div class="form-card">
                <label>🚉 ตำแหน่งที่ต้องการ</label>
                <select required>
                    <option value="" disabled selected>เลือก 1 ตำแหน่ง</option>
                    <option>พนักงานขับรถไฟ</option>
                    <option>นายสถานี</option>
                    <option>พนักงานขายตั๋ว</option>
                    <option>พนักงานคุมประแจ</option>
                    <option>พนักงานไม้กั้น</option>
                    <option>พนักงานรักษารถ</option>
                    <option>พนักงานห้ามล้อ</option>
                </select>
            </div>

            <div class="form-card">
                <label>📝 เหตุผลที่อยากสมัคร (2-3 บรรทัด)</label>
                <textarea rows="3" placeholder="ระบุเหตุผลของคุณ..." required></textarea>
            </div>

            <div class="form-card">
                <label>⚠️ คำสัญญา (จะไม่ทำให้คุณเต้ขายหน้า)</label>
                <select required>
                    <option value="" disabled selected>โปรดยืนยัน</option>
                    <option>ใช่ ข้าพเจ้าสัญญา</option>
                    <option>ไม่ (ไม่สามารถสมัครได้)</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">ส่งใบสมัครข้อมูล</button>
        </form>
    </div>
</div>

<script>
    function showForm() {
        document.getElementById('main-page').style.display = 'none';
        document.getElementById('form-page').style.display = 'block';
    }

    // ในอนาคตคุณสามารถนำ Webhook URL ของ Discord มาใส่ตรงนี้เพื่อส่งข้อมูลจริง
    const webhookURL = ""; // ใส่ URL ของ Discord Webhook ถ้ามี

    document.getElementById('applicationForm').onsubmit = function(e) {
        e.preventDefault();
        
        // ถ้าใส่ Webhook URL ไว้ ข้อมูลจะถูกส่งไปยัง Discord
        if (webhookURL) {
            // โค้ดสำหรับส่งข้อมูลไป Discord (จะใช้งานได้ก็ต่อเมื่อมี Webhook URL)
            alert('ส่งข้อมูลไปยัง Discord เรียบร้อยแล้ว! (ถ้าใส่ Webhook URL ไว้)');
        } else {
            // ถ้าไม่มี Webhook URL ก็แค่ขึ้น Alert แจ้งเตือน
            alert('ส่งใบสมัครเรียบร้อยแล้ว!');
        }
    };
</script>

</body>
</html>
